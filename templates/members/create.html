{% extends "base.html" %}
{% block title %}회원 등록{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-person-plus"></i> 회원 등록</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">이름 <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">전화번호 <span class="text-danger">*</span></label>
                <input type="text" name="phone" class="form-control" placeholder="010-0000-0000" required>
            </div>
            <div class="mb-3">
                <label class="form-label">이메일</label>
                <input type="email" name="email" class="form-control">
            </div>
            <button class="btn btn-primary">등록</button>
            <a href="{{ url_for('members.list_members') }}" class="btn btn-outline-secondary">취소</a>
        </form>
    </div>
</div>
{% endblock %}
