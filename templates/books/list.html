{% extends "base.html" %}
{% block title %}도서 목록{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-journal-bookmark"></i> 도서 목록</h2>
    <a href="{{ url_for('books.create') }}" class="btn btn-primary"><i class="bi bi-journal-plus"></i> 도서 등록</a>
</div>

<form class="row g-2 mb-3" method="get">
    <div class="col-md-4">
        <input type="text" name="q" class="form-control" placeholder="제목 또는 저자 검색" value="{{ q }}">
    </div>
    <div class="col-md-3">
        <select name="category" class="form-select">
            <option value="">전체 분류</option>
            {% for c in categories %}
            <option value="{{ c }}" {{ 'selected' if category == c }}>{{ c }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-2">
        <button class="btn btn-outline-secondary w-100">검색</button>
    </div>
</form>

<table class="table table-hover">
    <thead class="table-dark">
        <tr>
            <th>제목</th>
            <th>저자</th>
            <th>분류</th>
            <th>재고</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for b in books %}
        <tr>
            <td><a href="{{ url_for('books.detail', id=b.id) }}">{{ b.title }}</a></td>
            <td>{{ b.author }}</td>
            <td>{{ b.category }}</td>
            <td>
                <span class="{{ 'text-danger' if b.available_qty == 0 else '' }}">
                    {{ b.available_qty }} / {{ b.total_qty }}
                </span>
            </td>
            <td><a href="{{ url_for('books.detail', id=b.id) }}" class="btn btn-sm btn-outline-primary">상세</a></td>
        </tr>
        {% else %}
        <tr><td colspan="5" class="text-center text-muted">등록된 도서가 없습니다.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
