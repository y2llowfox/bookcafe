{% extends "base.html" %}
{% block title %}도서 등록{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-journal-plus"></i> 도서 등록</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">제목 <span class="text-danger">*</span></label>
                <input type="text" name="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">저자 <span class="text-danger">*</span></label>
                <input type="text" name="author" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">ISBN</label>
                <input type="text" name="isbn" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">분류</label>
                <input type="text" name="category" class="form-control" placeholder="예: 소설, 자기계발, IT">
            </div>
            <div class="mb-3">
                <label class="form-label">수량</label>
                <input type="number" name="total_qty" class="form-control" value="1" min="1">
            </div>
            <button class="btn btn-primary">등록</button>
            <a href="{{ url_for('books.list_books') }}" class="btn btn-outline-secondary">취소</a>
        </form>
    </div>
</div>
{% endblock %}
